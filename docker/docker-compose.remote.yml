services:
  app:
    image: ${IMAGE_NAME:?IMAGE_NAME is required}
    container_name: ${CONTAINER_NAME:-ai-assistant-platform}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-production}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${HOST_PORT:-80}:${CONTAINER_PORT:-3000}"
